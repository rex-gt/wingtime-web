name: Deploy to Vercel Preview

on:
  push:
    branches:
      - preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Preview
        run: vercel deploy --token=${{ secrets.VERCEL_TOKEN }}